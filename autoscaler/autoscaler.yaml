apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoscaler
  template:
    metadata:
      labels:
        app: autoscaler
    spec:
      containers:
      - name: autoscaler
        image: autoscaler:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: autoscaler-service
spec:
  selector:
    app: autoscaler
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000