apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sheal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8sheal
  template:
    metadata:
      labels:
        app: k8sheal
    spec:
      containers:
      - name: k8sheal
        image: k8sheal:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: k8sheal-clusterip
spec:
  selector:
    app: k8sheal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: k8sheal-nodeport
spec:
  selector:
    app: k8sheal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort